# /etc/nginx/sites-available/sborkai.ru
# Replace sborkai-vercel-project.vercel.app with the Vercel deployment host.
# Replace /var/www/sborkai/dist if the static build lives elsewhere.

server {
  listen 80;
  listen [::]:80;
  server_name sborkai.ru www.sborkai.ru;

  return 301 https://sborkai.ru$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.sborkai.ru;

  ssl_certificate /etc/letsencrypt/live/sborkai.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/sborkai.ru/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  return 301 https://sborkai.ru$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name sborkai.ru;

  root /var/www/sborkai/dist;
  index index.html;

  ssl_certificate /etc/letsencrypt/live/sborkai.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/sborkai.ru/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  location = /api/telegram-brief {
    proxy_pass https://sborkai-vercel-project.vercel.app/api/telegram-brief;
    proxy_http_version 1.1;
    proxy_set_header Host sborkai-vercel-project.vercel.app;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_server_name on;
  }

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
